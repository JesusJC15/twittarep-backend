server:
  port: 8080

spring:
  application:
    name: twittarep-backend
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/twittarep_backend}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${AUTH0_ISSUER_URI:https://your-domain.auth0.com/}

management:
  endpoints:
    web:
      exposure:
        include: health

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html

app:
  security:
    audience: ${AUTH0_AUDIENCE:https://api.twittarep.example.com}
  cors:
    allowed-origins:
      - ${FRONTEND_LOCAL_ORIGIN:http://localhost:5173}
      - ${FRONTEND_S3_ORIGIN:https://your-bucket.s3-website-us-east-1.amazonaws.com}
